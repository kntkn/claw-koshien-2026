<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claw Koshien 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    #app {
      width: 100%; height: 100%;
      display: flex;
    }
    #viewport {
      flex: 7;
      position: relative;
      min-width: 0;
    }
    #viewport canvas { display: block; width: 100%; height: 100%; }
    #dashboard {
      flex: 3;
      min-width: 280px;
      max-width: 420px;
      border-left: 1px solid #1e2230;
    }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #0a0a0f; color: #5cf89a; font-family: 'SF Mono', monospace; font-size: 18px;
      z-index: 1000; transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="loading">CLAW KOSHIEN 2026 - LOADING...</div>
  <div id="app">
    <div id="viewport"></div>
    <div id="dashboard"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
